name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🐳 Build Docker Image
      - name: Build Docker Image
        run: docker build -t my-app .

      # 🔐 Trivy Scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'